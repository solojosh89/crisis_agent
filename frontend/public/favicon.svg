<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3a3a"/>
      <stop offset="1" stop-color="#9e0000"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- rounded badge -->
  <rect x="2" y="2" width="96" height="96" rx="26" fill="url(#bg)"/>
  <rect x="2" y="2" width="96" height="96" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

  <!-- white heart -->
  <path filter="url(#soft)" fill="#ffffff" d="M50 79
    C50 79 19 58 19 38
    C19 28 27 21 35 21
    C42 21 47 25 50 31
    C53 25 58 21 65 21
    C73 21 81 28 81 38
    C81 58 50 79 50 79 Z"/>

  <!-- heartbeat / ECG pulse line across the heart -->
  <path fill="none" stroke="#c20000" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"
    d="M26 49 H39 L44 38 L51 62 L57 44 L61 49 H74"/>
</svg>
